<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Fruit Ninja</title>
  <link rel="stylesheet" href="/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
</head>

<body>
  <div id="app">
    <!-- fallbacks / edges -->
    <div class="bg-fallback"></div>

    <!-- Camera stream -->
    <video id="input_video" autoplay playsinline style="display: none;"></video>

    <!-- Canvas for game elements, blade, etc. -->
    <canvas id="output_canvas" width="1280" height="720"></canvas>

    <!-- HUD Layer -->
    <div id="hud" class="hud-layer hidden">
      <div id="score-container"><span id="score">0</span></div>
      <div id="lives-container"><span id="hearts-display"></span></div>
    </div>

    <!-- Screen Overlays -->
    <div id="overlay-container" class="overlay-state">
      <!-- 1. Start Screen -->
      <div id="overlay-start" class="screen-view hidden">
        <h1 class="game-title">Air slice</h1>
        <p class="game-subtitle">Touch some fruits</p>
        <div class="mode-selection">
          <button id="mode-classic" class="mode-btn active">CLASSIC</button>
          <button id="mode-zen" class="mode-btn">ZEN MODE</button>
        </div>
        <button id="action-button">START GAME</button>
        <div id="helper-text-container" class="helper-text">Sit far away & use open hands</div>
      </div>

      <!-- 2. Loading Screen -->
      <div id="overlay-loading" class="screen-view">
        <div class="loader-ring">
          <div></div>
          <div></div>
          <div></div>
          <div></div>
        </div>
        <h2 class="loading-title">INITIALIZING TRACKER</h2>
        <p class="loading-subtitle">Preparing camera and hand tracking...</p>
      </div>

      <!-- 3. Pause Screen -->
      <div id="overlay-paused" class="screen-view hidden">
        <div class="icon-indicator">⏸</div>
        <h2 class="overlay-title">PAUSED</h2>
        <div class="overlay-button-group">
          <button id="btn-resume-pause" class="menu-btn">RESUME</button>
          <button id="btn-quit-pause" class="menu-btn danger">MAIN MENU</button>
        </div>
        <p class="overlay-subtitle" style="margin-top: 20px;">Or Pinch and hold to Resume</p>
      </div>

      <!-- 4. No Hand Screen -->
      <div id="overlay-no-hand" class="screen-view hidden">
        <div class="icon-indicator hand-pulse">✋</div>
        <h2 class="overlay-title">HAND LOST</h2>
        <p class="overlay-subtitle">Move hand into frame</p>
      </div>

      <!-- 5. Game Over Screen -->
      <div id="overlay-game-over" class="screen-view hidden">
        <h1 class="game-title text-red">GAME OVER</h1>
        <div class="game-over-stats">
          <div style="font-size: 28px; margin-bottom: 8px;">SCORE: <span id="final-score"
              style="color: #ffcc00;">0</span></div>
          <div class="high-score-display" style="font-size: 22px; color: rgba(255,255,255,0.7);">HIGH SCORE: <span
              id="high-score" style="color: #ffcc00;">0</span></div>
        </div>
        <div class="overlay-button-group">
          <button id="btn-restart-game" class="menu-btn">PLAY AGAIN</button>
          <button id="btn-quit-game" class="menu-btn danger">MAIN MENU</button>
        </div>
      </div>
    </div>
    <div id="white-flash" class="flash-overlay"></div>
    <div id="fps-counter" class="fps-layer">-- FPS</div>
  </div>

  <script type="module" src="/main.js"></script>
</body>

</html>
